name: Cross-Platform Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: antra-wails/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Linux GUI Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            upx

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: |
          brew install upx || true

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Python Backend
        working-directory: antra-wails
        run: |
          mkdir -p runtime/backend
          pyinstaller backend_runtime.spec --distpath runtime/backend --noconfirm

      - name: Build Wails App (Linux)
        if: runner.os == 'Linux'
        working-directory: antra-wails
        run: wails build -clean -tags webkit2gtk_4_1

      - name: Build Wails App (macOS)
        if: runner.os == 'macOS'
        working-directory: antra-wails
        run: wails build -clean

      - name: Package Linux Binary
        if: runner.os == 'Linux'
        run: |
          BIN=$(find antra-wails/build/bin -maxdepth 1 -type f ! -name "*.app" | head -1)
          mv "$BIN" antra-wails/build/bin/Antra-Linux
          chmod +x antra-wails/build/bin/Antra-Linux

      - name: Package macOS App
        if: runner.os == 'macOS'
        run: |
          cd antra-wails/build/bin
          APP=$(find . -maxdepth 1 -name "*.app" | head -1)
          tar -czvf Antra-MacOS.tar.gz "$APP"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            antra-wails/build/bin/Antra-Linux
            antra-wails/build/bin/Antra-MacOS.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
