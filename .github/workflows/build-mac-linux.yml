name: Cross-Platform Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Linux GUI Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev upx

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Python Backend
        working-directory: antra-wails
        run: |
          mkdir -p runtime/backend
          pyinstaller backend_runtime.spec --distpath runtime/backend --noconfirm

      - name: Build Wails App
        working-directory: antra-wails
        run: ~/go/bin/wails build -clean

      - name: Package Linux Binary
        if: runner.os == 'Linux'
        run: |
          mv antra-wails/build/bin/antra antra-wails/build/bin/Antra-Linux || mv antra-wails/build/bin/Antra antra-wails/build/bin/Antra-Linux || true
          chmod +x antra-wails/build/bin/Antra-Linux || true

      - name: Package macOS App
        if: runner.os == 'macOS'
        run: |
          cd antra-wails/build/bin
          tar -czvf Antra-MacOS.tar.gz antra.app || tar -czvf Antra-MacOS.tar.gz Antra.app || true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            antra-wails/build/bin/Antra-Linux
            antra-wails/build/bin/Antra-MacOS.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
