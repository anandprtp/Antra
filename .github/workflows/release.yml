name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      WAILS_VERSION: v2.12.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: antra-wails/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python Dependencies
        run: pip install -r requirements-desktop.txt

      - name: Install UPX
        run: |
          choco install upx -y
          upx --version

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build Python Backend
        working-directory: antra-wails
        run: |
          New-Item -ItemType Directory -Force -Path runtime/backend | Out-Null
          pyinstaller backend_runtime.spec --distpath runtime/backend --noconfirm

      - name: Build Wails App
        working-directory: antra-wails
        run: wails build -clean

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Antra-Windows
          path: antra-wails/build/bin/Antra.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    env:
      WAILS_VERSION: v2.12.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: antra-wails/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python Dependencies
        run: pip install -r requirements-desktop.txt

      - name: Install Linux GUI Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            upx \
            libfuse2 \
            file \
            patchelf

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build Python Backend
        working-directory: antra-wails
        run: |
          mkdir -p runtime/backend
          pyinstaller backend_runtime.spec --distpath runtime/backend --noconfirm

      - name: Build Wails App
        working-directory: antra-wails
        run: wails build -clean -tags webkit2_41

      - name: Package as AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          # Find the built binary
          BIN=$(find antra-wails/build/bin -maxdepth 1 -type f -executable | head -1)

          # Create AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/lib

          cp "$BIN" AppDir/usr/bin/Antra

          # Bundle webkit2gtk-4.1 libs so the AppImage matches Ubuntu 24.04
          WEBKIT_LIBS=$(dpkg -L libwebkit2gtk-4.1-dev 2>/dev/null | grep '\.so' || true)
          for lib in $WEBKIT_LIBS; do
            [ -f "$lib" ] && cp -n "$lib" AppDir/usr/lib/ 2>/dev/null || true
          done
          # Copy the actual shared libs
          for lib in /usr/lib/x86_64-linux-gnu/libwebkit2gtk-4.1* /usr/lib/x86_64-linux-gnu/libjavascriptcoregtk-4.1*; do
            [ -f "$lib" ] && cp -n "$lib" AppDir/usr/lib/ 2>/dev/null || true
          done
          # Copy webkit2 auxiliary processes and resources
          if [ -d /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1 ]; then
            mkdir -p AppDir/usr/lib/webkit2gtk-4.1
            cp -r /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/. AppDir/usr/lib/webkit2gtk-4.1/ 2>/dev/null || true
          fi

          # Desktop entry
          printf '[Desktop Entry]\nName=Antra\nExec=Antra\nIcon=Antra\nType=Application\nCategories=AudioVideo;Audio;\n' > AppDir/Antra.desktop

          # Icon
          cp antra-wails/frontend/src/assets/images/logo-universal.png AppDir/Antra.png

          # AppRun — sets up library paths and launches the binary
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "${0}")")"\nexport LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"\nexport WEBKIT_EXEC_PATH="${HERE}/usr/lib/webkit2gtk-4.1"\nexec "${HERE}/usr/bin/Antra" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

          # Build the AppImage
          ARCH=x86_64 /tmp/appimagetool AppDir Antra-Linux.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Antra-Linux
          path: Antra-Linux.AppImage

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      WAILS_VERSION: v2.12.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: antra-wails/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python Dependencies
        run: pip install -r requirements-desktop.txt

      - name: Install macOS Dependencies
        run: brew install create-dmg upx || true

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build Python Backend
        working-directory: antra-wails
        run: |
          mkdir -p runtime/backend
          pyinstaller backend_runtime.spec --distpath runtime/backend --noconfirm

      - name: Build Wails App
        working-directory: antra-wails
        run: wails build -clean

      - name: Package as DMG
        run: |
          APP=$(find antra-wails/build/bin -maxdepth 1 -name "*.app" | head -1)
          create-dmg \
            --volname "Antra" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$(basename $APP)" 175 190 \
            --hide-extension "$(basename $APP)" \
            --app-drop-link 425 190 \
            "Antra-macOS.dmg" \
            "$APP"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Antra-macOS
          path: Antra-macOS.dmg

  release:
    name: Upload to Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event.inputs.tag }}" != "" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: .github/release-notes.md
          files: |
            dist/Antra-Windows/Antra.exe
            dist/Antra-Linux/Antra-Linux.AppImage
            dist/Antra-macOS/Antra-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
